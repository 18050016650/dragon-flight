<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="screen-orientation" content="landscape">
  <meta name="x5-orientation" content="landscape">
  <title>3D神龙飞行</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; height: 100%; overflow: hidden; 
      background: #000; font-family: Arial, sans-serif;
      touch-action: none;
    }
    #game-container { 
      width: 100%; height: 100%; position: fixed; top: 0; left: 0;
    }
    canvas { 
      display: block; width: 100% !important; height: 100% !important;
      position: fixed; top: 0; left: 0; z-index: 1;
    }
    
    /* 开始界面 */
    #start-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a0a4e 0%, #0a0a2e 50%, #000 100%);
      z-index: 1000; padding: 20px;
    }
    .main-title { font-size: 36px; font-weight: bold; color: #ffd700; margin-bottom: 10px; text-align: center; }
    .sub-title { font-size: 14px; color: #00ffff; margin-bottom: 30px; }
    .info-box { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 12px; padding: 15px 20px; margin-bottom: 15px; color: #fff; width: 90%; max-width: 400px; }
    .info-box h3 { color: #ffd700; margin-bottom: 10px; font-size: 16px; }
    .info-box p { margin: 5px 0; font-size: 13px; color: rgba(255,255,255,0.8); }
    .start-btn { padding: 18px 60px; font-size: 22px; font-weight: bold; color: #1a1a4e; background: linear-gradient(45deg, #ffd700, #ff6b00); border: none; border-radius: 50px; cursor: pointer; margin-top: 20px; -webkit-tap-highlight-color: transparent; }
    .start-btn:active { transform: scale(0.95); }
    
    /* 游戏UI */
    #game-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
    .top-stats { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 101; }
    .stat-item { background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,215,0,0.3); }
    .stat-label { font-size: 11px; color: #aaa; }
    .stat-value { font-size: 16px; color: #ffd700; font-weight: bold; }
    
    /* 控制按钮 */
    .mobile-controls { position: absolute; bottom: 80px; right: 20px; display: none; flex-direction: column; gap: 15px; pointer-events: auto; }
    .control-btn { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
    .boost-btn { background: linear-gradient(45deg, #ff6b00, #ff0000); box-shadow: 0 0 20px rgba(255,107,0,0.5); }
    .attack-btn { background: linear-gradient(45deg, #00ffff, #0099ff); box-shadow: 0 0 20px rgba(0,255,255,0.5); }
    .control-btn:active { transform: scale(0.9); }
    
    /* 暂停/结束界面 */
    #pause-overlay, #game-over { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; flex-direction: column; align-items: center; justify-content: center; color: #fff; pointer-events: auto; }
    #pause-overlay h2 { font-size: 32px; margin-bottom: 15px; }
    #game-over h1 { font-size: 42px; color: #ff0000; margin-bottom: 15px; }
    .final-score { font-size: 22px; color: #ffd700; }
    
    /* 手机端显示控制 */
    @media (max-width: 767px) {
      .mobile-controls { display: flex !important; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="canvas"></canvas>
    
    <!-- 开始界面 -->
    <div id="start-screen">
      <div class="main-title">🐉 神龙飞行</div>
      <div class="sub-title">DRAGON FLIGHT 3D</div>
      <div class="info-box">
        <h3>🎮 操作说明</h3>
        <p>📱 滑动屏幕 - 控制方向</p>
        <p>🔥 右下角按钮 - 加速</p>
        <p>⚔️ 攻击按钮 - 攻击BOSS</p>
      </div>
      <button class="start-btn" id="start-btn">开始游戏</button>
    </div>
    
    <!-- 游戏UI -->
    <div id="game-ui">
      <div class="top-stats">
        <div class="stat-item"><div class="stat-label">分数</div><div class="stat-value" id="score">0</div></div>
        <div class="stat-item"><div class="stat-label">长度</div><div class="stat-value" id="length">20</div></div>
      </div>
      <div class="mobile-controls">
        <div class="control-btn attack-btn" id="attack-btn">⚔️</div>
        <div class="control-btn boost-btn" id="boost-btn">🔥</div>
      </div>
    </div>
    
    <!-- 暂停/结束 -->
    <div id="pause-overlay" onclick="togglePause()"><h2>⏸ 游戏暂停</h2><p>点击继续</p></div>
    <div id="game-over" onclick="location.reload()"><h1>💀 游戏结束</h1><div class="final-score">最终分数: <span id="final-score">0</span></div></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // 游戏状态
    const state = {
      playing: false, paused: false, score: 0,
      mouse: { x: 0, y: 0 }, boosting: false,
      dragon: { pos: new THREE.Vector3(0,0,0), dir: new THREE.Vector3(0,0,1), targetDir: new THREE.Vector3(0,0,1), speed: 0.15, length: 20 },
      foods: [], obstacles: [], bodySegments: [], difficulty: 1
    };

    // Three.js 初始化
    const canvas = document.getElementById('canvas');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x1a1a4e, 0.015);
    
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    
    function resize() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }
    resize();
    window.addEventListener('resize', resize);
    
    scene.add(new THREE.AmbientLight(0x666666, 1.2));
    const light = new THREE.DirectionalLight(0xffffff, 1.5);
    light.position.set(10, 20, 10);
    scene.add(light);
    const backLight = new THREE.DirectionalLight(0xffd700, 0.8);
    backLight.position.set(-10, 10, -10);
    scene.add(backLight);
    scene.add(light);

    // 星空
    const starsGeo = new THREE.BufferGeometry();
    const starsPos = [];
    for (let i = 0; i < 3000; i++) starsPos.push((Math.random()-0.5)*400, (Math.random()-0.5)*400, (Math.random()-0.5)*400);
    starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsPos, 3));
    const starsMesh = new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 }));
    scene.add(starsMesh);

    // 龙
    const dragonGroup = new THREE.Group();
    scene.add(dragonGroup);
    
    function createHead() {
      const head = new THREE.Group();
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9, roughness: 0.15, emissive: 0xffaa00, emissiveIntensity: 0.3 });
      const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.4, 2.2), bodyMat);
      head.add(body);
      const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 5 });
      const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), eyeMat);
      leftEye.position.set(-0.7, 0.3, 0.4);
      head.add(leftEye);
      const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), eyeMat);
      rightEye.position.set(0.7, 0.3, 0.4);
      head.add(rightEye);
      return head;
    }
    const dragonHead = createHead();
    dragonGroup.add(dragonHead);
    
    function createSegment(i, total) {
      const scale = Math.max(0.4, 1 - i/total * 0.6);
      const seg = new THREE.Group();
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2, emissive: 0xffaa00, emissiveIntensity: 0.2 });
      const body = new THREE.Mesh(new THREE.CylinderGeometry(scale*0.75, scale*0.85, 0.7, 12).rotateX(Math.PI/2), bodyMat);
      seg.add(body);
      return seg;
    }
    
    function initBody() {
      state.bodySegments.forEach(s => dragonGroup.remove(s.mesh));
      state.bodySegments = [];
      for (let i = 0; i < state.dragon.length; i++) {
        const seg = createSegment(i, state.dragon.length);
        seg.position.set(0, 0, -i*0.8);
        dragonGroup.add(seg);
        state.bodySegments.push({ mesh: seg, pos: new THREE.Vector3(0, 0, -i*0.8) });
      }
    }

    // 食物
    const foodGroup = new THREE.Group();
    scene.add(foodGroup);
    function spawnFood() {
      if (state.foods.length >= 10) return;
      const food = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 }));
      const pos = new THREE.Vector3((Math.random()-0.5)*30, (Math.random()-0.5)*20, state.dragon.pos.z + 50 + Math.random()*50);
      food.position.copy(pos);
      foodGroup.add(food);
      state.foods.push({ mesh: food, pos: pos });
    }

    // 障碍物
    const obstacleGroup = new THREE.Group();
    scene.add(obstacleGroup);
    function spawnObstacle() {
      if (state.obstacles.length >= 5) return;
      const obs = new THREE.Mesh(new THREE.DodecahedronGeometry(2 + Math.random()*2), new THREE.MeshStandardMaterial({ color: 0x666666 }));
      const pos = new THREE.Vector3((Math.random()-0.5)*40, (Math.random()-0.5)*20, state.dragon.pos.z + 60 + Math.random()*40);
      obs.position.copy(pos);
      obstacleGroup.add(obs);
      state.obstacles.push({ mesh: obs, pos: pos });
    }

    // 游戏逻辑
    function updateDragon(dt) {
      const d = state.dragon;
      d.targetDir.set(-state.mouse.x * 6, state.mouse.y * 5, 1).normalize();
      d.dir.lerp(d.targetDir, 0.6).normalize();
      d.pos.add(d.dir.clone().multiplyScalar((state.boosting ? d.speed * 2.5 : d.speed) * dt * 60));
      dragonHead.position.copy(d.pos);
      dragonHead.rotation.x = Math.asin(-d.dir.y);
      dragonHead.rotation.y = Math.atan2(d.dir.x, d.dir.z);
      
      for (let i = 0; i < state.bodySegments.length; i++) {
        const seg = state.bodySegments[i];
        const target = i === 0 ? d.pos.clone().add(d.dir.clone().multiplyScalar(-0.7)) : state.bodySegments[i-1].pos.clone().add(state.bodySegments[i-1].pos.clone().sub(seg.pos).normalize().multiplyScalar(-0.7));
        seg.pos.lerp(target, 0.25);
        seg.mesh.position.copy(seg.pos);
      }
    }
    
    function checkCollisions() {
      for (let i = state.foods.length - 1; i >= 0; i--) {
        if (state.dragon.pos.distanceTo(state.foods[i].pos) < 3) {
          state.score += 10; state.dragon.length += 2;
          foodGroup.remove(state.foods[i].mesh); state.foods.splice(i, 1);
          const seg = createSegment(state.bodySegments.length, state.dragon.length);
          const last = state.bodySegments[state.bodySegments.length-1];
          seg.position.copy(last.pos.clone().add(last.pos.clone().sub(state.bodySegments.length>1?state.bodySegments[state.bodySegments.length-2].pos:state.dragon.pos).normalize().multiplyScalar(-0.7)));
          dragonGroup.add(seg); state.bodySegments.push({ mesh: seg, pos: seg.position.clone() });
          updateUI();
        }
      }
      for (let i = state.obstacles.length - 1; i >= 0; i--) {
        if (state.dragon.pos.distanceTo(state.obstacles[i].pos) < 3.5) { gameOver(); return; }
        if (state.obstacles[i].pos.z - state.dragon.pos.z < -30) { obstacleGroup.remove(state.obstacles[i].mesh); state.obstacles.splice(i, 1); }
      }
    }
    
    function updateCamera() {
      const d = state.dragon;
      camera.position.lerp(new THREE.Vector3(d.pos.x - d.dir.x * 8, d.pos.y + 8, d.pos.z - 15), 0.1);
      camera.lookAt(d.pos.x + d.dir.x*5, d.pos.y, d.pos.z + d.dir.z*5);
    }
    
    function updateUI() {
      document.getElementById('score').textContent = state.score;
      document.getElementById('length').textContent = state.dragon.length;
    }
    
    function gameOver() {
      state.playing = false;
      document.getElementById('final-score').textContent = state.score;
      document.getElementById('game-over').style.display = 'flex';
    }
    
    function togglePause() {
      state.paused = !state.paused;
      document.getElementById('pause-overlay').style.display = state.paused ? 'flex' : 'none';
    }

    // 开始游戏
    function startGame() {
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('game-ui').style.display = 'block';
      state.playing = true; state.paused = false; state.score = 0; state.dragon.length = 20;
      state.dragon.pos.set(0,0,0); state.dragon.dir.set(0,0,1);
      state.foods.forEach(f => foodGroup.remove(f.mesh)); state.foods = [];
      state.obstacles.forEach(o => obstacleGroup.remove(o.mesh)); state.obstacles = [];
      initBody(); updateUI();
      lastTime = performance.now();
      gameLoop();
    }

    // 事件绑定
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('start-btn').addEventListener('touchstart', function(e){ e.preventDefault(); startGame(); });
    
    // 触摸控制 - 绑定到canvas
    let isTouching = false;
    canvas.addEventListener('touchstart', function(e) {
      if (!state.playing || state.paused) return;
      isTouching = true;
      const touch = e.touches[0];
      state.mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
      state.mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
    }, {passive: false});
    
    canvas.addEventListener('touchmove', function(e) {
      if (!state.playing || state.paused || !isTouching) return;
      e.preventDefault();
      const touch = e.touches[0];
      state.mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
      state.mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
    }, {passive: false});
    
    canvas.addEventListener('touchend', function() { isTouching = false; state.boosting = false; });
    
    // 鼠标控制
    document.addEventListener('mousemove', function(e) {
      if (!state.playing || state.paused) return;
      state.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      state.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });
    document.addEventListener('mousedown', function() { if (state.playing) state.boosting = true; });
    document.addEventListener('mouseup', function() { state.boosting = false; });
    
    // 按钮控制
    const boostBtn = document.getElementById('boost-btn');
    boostBtn.addEventListener('touchstart', function(e) { e.preventDefault(); state.boosting = true; this.style.transform = 'scale(0.9)'; });
    boostBtn.addEventListener('touchend', function(e) { e.preventDefault(); state.boosting = false; this.style.transform = 'scale(1)'; });
    boostBtn.addEventListener('mousedown', function() { state.boosting = true; this.style.transform = 'scale(0.9)'; });
    boostBtn.addEventListener('mouseup', function() { state.boosting = false; this.style.transform = 'scale(1)'; });
    
    const attackBtn = document.getElementById('attack-btn');
    attackBtn.addEventListener('touchstart', function(e) { e.preventDefault(); this.style.transform = 'scale(0.9)'; setTimeout(() => this.style.transform = 'scale(1)', 150); });
    attackBtn.addEventListener('mousedown', function() { this.style.transform = 'scale(0.9)'; setTimeout(() => this.style.transform = 'scale(1)', 150); });

    // 游戏循环
    let lastTime = performance.now();
    function gameLoop() {
      if (!state.playing) return;
      const now = performance.now();
      const dt = Math.min((now - lastTime) / 1000, 0.1);
      lastTime = now;
      
      if (!state.paused) {
        updateDragon(dt);
        checkCollisions();
        if (Math.random() < 0.05) spawnFood();
        if (Math.random() < 0.02) spawnObstacle();
        starsMesh.position.copy(state.dragon.pos);
      }
      updateCamera();
      renderer.render(scene, camera);
      requestAnimationFrame(gameLoop);
    }

    // 初始渲染
    initBody();
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);
    renderer.render(scene, camera);
  </script>
</body>
</html>
